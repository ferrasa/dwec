<!doctype html>
<html>
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">
	<style type="text/css">
		body {
		   padding-top: 40px;
		   background-color: rgb(231, 231, 231);
		}
		
	</style>
    <title>Contato</title>
  </head>
  <body>
	  
	  <div class="container">
		  <div class="shadow p-3 mb-5 bg-white rounded">
			  <div class="row">
				  <div class="col-sm">
					  <div class="alert alert-light" role="alert">
						  	<h3>Contato </h3>
						  <form id="fContato" method="post" action="contato.php">
  						    <div class="form-group">
  						      <label for="nome">Nome</label>
  						      <input type="text" class="form-control" id="nome" name="nome">
  						    </div>
							  
						    <div class="form-group">
						      <label for="email">E-mail</label>
						      <input type="email" class="form-control" id="email" name="email">
						    </div>
							<div class="form-group">
							    <label for="mensagem">Mensagem</label>
							    <textarea class="form-control" id="mensagem" name="mensagem" rows="4"></textarea>
								<small id="erro" class="form-text text-danger"></small>
							</div>
							<div class="float-right">
						    	<button type="submit" class="btn btn-secondary btn-sm">Enviar</button>
							</div>
						  </form>
						  
					  </div>
				  </div>
				  <div class="col-sm">
					<img style='height: 100%; width: 100%; ' src="map2.svg">
					
				 </div>				  
			  </div>
		  </div>
	  </div>
	  <script>
	  			var formContato = document.getElementById('fContato');
			
	  			formContato.onsubmit = function(ev) {
				
	  				var nome = document.getElementById('nome').value;
	  				var email = document.getElementById('email').value;
	  				var msg = document.getElementById('mensagem').value;
						
	  				if (nome == '' || email == '' || msg == '') {
	  					ev.preventDefault();
						document.getElementById("erro").innerHTML = 'Todos os campos do formulário devem ser preenchidos.';
	  					return false;
	  				}
				
	  				//alert('Sua mensagem foi enviada, obrigado!');
					return true;
	  			}
	  </script>


  </body>
</html>
